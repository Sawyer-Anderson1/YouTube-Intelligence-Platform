name: Frontend CI/CD

on:
  push:
    branches:
      - frontend-main
  pull_request:
    branches:
      - frontend-main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # compatible with React 16 and cross-env

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Optional: run lint
      - name: Lint check
        run: npm run lint:check

      # Build frontend
      - name: Build frontend
        run: npm run build

      # Optional: run tests
      - name: Run tests
        run: npm test

      # Optional: deploy step
      # - name: Deploy
      #   run: npm run deploy